<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GDELT Realtime Globe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #e5eefc;
      overflow: hidden;
    }
    #globeViz {
      position: fixed;
      top: 0;
      left: 0;
      right: 300px;
      bottom: 0;
      overflow: hidden;
      cursor: grab;
    }
    #sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100vh;
      border-left: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(6, 11, 21, 0.85);
      padding: 1rem;
      overflow-y: auto;
      z-index: 10;
      box-sizing: border-box;
    }
    .event {
      border: 1px solid rgba(173, 216, 255, 0.22);
      border-radius: 8px;
      padding: 0.6rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      line-height: 1.3;
      background: rgba(24, 35, 60, 0.6);
      cursor: pointer;
      user-select: none;
    }
    .event.hovered { background: rgba(40, 60, 100, 0.9); border-color: rgba(173, 216, 255, 0.6); }
    .event.selected { border-color: #ff7d41; background: rgba(60, 35, 20, 0.8); }
    .muted { color: #9eb0cf; }
    #rotateBtn {
      margin-top: 0.5rem;
      padding: 0.35rem 0.75rem;
      background: rgba(255, 125, 65, 0.15);
      border: 1px solid rgba(255, 125, 65, 0.5);
      border-radius: 6px;
      color: #ff7d41;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #rotateBtn:hover { background: rgba(255, 125, 65, 0.28); }
  </style>
</head>
<body>
<div id="globeViz"></div>
<aside id="sidebar">
    <h2>Live GDELT Events</h2>
    <p class="muted">Realtime geopolitical events streamed from GDELT 2.0.</p>
    <div id="status">Connecting…</div>
    <button id="rotateBtn">Pause rotation</button>
    <hr />
    <div id="events"></div>
  </aside>

<script src="https://unpkg.com/globe.gl"></script>
<script>
(function () {
  const globeEl = document.getElementById('globeViz');
  const globe = Globe()(globeEl)
    .width(globeEl.offsetWidth)
    .height(globeEl.offsetHeight)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .pointsData([])
    .pointColor(() => '#ff7d41')
    .pointAltitude(0.015)
    .pointRadius(0.14)
    .pointLabel(d => `${d.actor1Name} → ${d.actor2Name}<br/>${d.timestampUtc}<br/>code=${d.eventCode}`)
    .ringsData([])
    .ringColor(() => t => `rgba(255,125,65,${1 - t})`)
    .ringMaxRadius(2)
    .ringPropagationSpeed(2)
    .ringRepeatPeriod(1200);

  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.35;

  const rotateBtn = document.getElementById('rotateBtn');
  rotateBtn.addEventListener('click', () => {
    const rotating = !globe.controls().autoRotate;
    globe.controls().autoRotate = rotating;
    rotateBtn.textContent = rotating ? 'Pause rotation' : 'Resume rotation';
  });

  const points = [];
  const rings = [];
  const maxMarkers = 600;
  const topEvents = [];
  const eventsPanel = document.getElementById('events');
  const sidebar = document.getElementById('sidebar');
  const status = document.getElementById('status');

  // Single delegated listener on sidebar — we know sidebar receives pointer events
  // because the Pause button works. Use closest() to find the card from any child element.
  let hoveredCard = null;

  sidebar.addEventListener('mouseover', e => {
    const card = e.target.closest('.event');
    if (card === hoveredCard) return;
    if (hoveredCard) hoveredCard.classList.remove('hovered');
    hoveredCard = card;
    if (card) card.classList.add('hovered');
  });

  sidebar.addEventListener('mouseout', e => {
    const card = e.target.closest('.event');
    if (card && !card.contains(e.relatedTarget)) {
      card.classList.remove('hovered');
      if (hoveredCard === card) hoveredCard = null;
    }
  });

  sidebar.addEventListener('click', e => {
    const card = e.target.closest('.event');
    if (!card) return;
    const lat = parseFloat(card.dataset.lat);
    const lng = parseFloat(card.dataset.lng);
    document.querySelectorAll('.event.selected').forEach(el => el.classList.remove('selected'));
    card.classList.add('selected');
    globe.controls().autoRotate = false;
    rotateBtn.textContent = 'Resume rotation';
    globe.pointOfView({ lat, lng, altitude: 2.5 }, 1000);
  });

  let renderTimer = null;
  function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(() => {
      topEvents.sort((a, b) => b.numMentions - a.numMentions || b.numSources - a.numSources);
      topEvents.splice(40);
      hoveredCard = null;
      eventsPanel.innerHTML = '';
      for (const ev of topEvents) {
        const row = document.createElement('div');
        row.className = 'event';
        row.dataset.lat = ev.latitude;
        row.dataset.lng = ev.longitude;
        row.innerHTML = `<strong>${ev.actor1Name}</strong> → <strong>${ev.actor2Name}</strong><br/>` +
          `<span class="muted">${ev.timestampUtc}</span><br/>` +
          `code=${ev.eventCode}, tone=${ev.avgTone}, mentions=${ev.numMentions}<br/>` +
          `<span class="muted">lat=${ev.latitude.toFixed(3)}, lon=${ev.longitude.toFixed(3)}</span>`;
        eventsPanel.appendChild(row);
      }
    }, 300);
  }

  const source = new EventSource('/api/events/stream');
  source.onopen = () => status.textContent = 'Connected';
  source.onerror = () => status.textContent = 'Disconnected (retrying...)';

  source.addEventListener('event', (msg) => {
    const event = JSON.parse(msg.data);

    points.unshift({ lat: event.latitude, lng: event.longitude, ...event });
    rings.unshift({ lat: event.latitude, lng: event.longitude, maxR: 2 });

    if (points.length > maxMarkers) points.length = maxMarkers;
    if (rings.length > maxMarkers) rings.length = maxMarkers;

    globe.pointsData(points);
    globe.ringsData(rings);

    topEvents.push(event);
    scheduleRender();
  });
})();
</script>
</body>
</html>
